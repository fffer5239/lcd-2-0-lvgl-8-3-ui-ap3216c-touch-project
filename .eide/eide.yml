targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - USE_HAL_DRIVER
        - STM32F407xx
      incList:
        - .
        - ..
        - Core/Inc
        - Drivers/CMSIS/Device/ST/STM32F4xx/Include
        - Drivers/CMSIS/Include
        - Drivers/STM32F4xx_HAL_Driver/Inc
        - Drivers/STM32F4xx_HAL_Driver/Inc/Legacy
        - BSP
        - BSP/lckfb_log
        - BSP/lcd
        - BSP/soft_i2c
        - BSP/touch
        - App/lcd-lvgl-test
        - LIB/LVGL-8.3/src/hal
        - BSP/ap3216c
      libList: []
    excludeList:
      - ../BSP/retarget.c
      - <virtual_root>/BSP/flex_log.c
      - <virtual_root>/LVGL_app
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler:
            ASM_FLAGS: ""
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: ""
            C_FLAGS: ""
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: softfp
            misc-control: --specs=nosys.specs --specs=nano.specs
            output-debug-info: enable
          linker:
            LD_FLAGS: ""
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: STM32F407XX_FLASH.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: STM32F407VE
          vendor: ST
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: cmsis-dap
        target: stm32f4x
      STLink:
        address: "0x08000000"
        bin: ""
        elFile: None
        optionBytes: .eide/debug.st.option.bytes.ini
        otherCmds: ""
        proType: SWD
        resetMode: default
        runAfterProgram: true
        speed: 4000
      probe-rs:
        allowEraseAll: false
        baseAddr: "0x08000000"
        bin: ""
        otherOptions: ""
        protocol: swd
        speed: 10000
        target: STM32F407VE
    uploader: OpenOCD
